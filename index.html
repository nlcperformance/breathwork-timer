<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NLC Performance Breathing</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#ff6300',
                        'tactical-black': '#050505',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Oswald:wght@400;600;700&display=swap');
        
        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Oswald', sans-serif;
            overflow: hidden; /* Prevents all scrolling */
            touch-action: manipulation;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Animations */
        @keyframes pulse-orange {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 99, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 99, 0, 0); }
        }
        .animate-pulse-orange { animation: pulse-orange 2s infinite; }

        .btn-tactical {
            background: #111;
            border: 1px solid #333;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }
        .btn-tactical:active { transform: scale(0.98); }
        .btn-tactical.selected {
            border-color: #ff6300;
            background: #1a0a00;
            color: #ff6300;
            font-weight: bold;
        }

        /* Breathing Circle Animation Classes */
        .breath-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #333;
            background: radial-gradient(circle, rgba(255,99,0,0.2) 0%, rgba(5,5,5,0) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 99, 0, 0.05);
            margin: 0 auto;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 10s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-full relative"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ZEN AUDIO ENGINE (Singing Bowl Chime) ---
        const AudioEngine = {
            ctx: null,
            init: () => {
                if (!AudioEngine.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    AudioEngine.ctx = new AudioContext();
                }
            },
            playBell: () => {
                if (!AudioEngine.ctx) return;
                const now = AudioEngine.ctx.currentTime;
                
                // Layer 1: Deep Fundamental Tone
                const osc1 = AudioEngine.ctx.createOscillator();
                const gain1 = AudioEngine.ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(250, now); 
                gain1.gain.setValueAtTime(0, now);
                gain1.gain.linearRampToValueAtTime(0.4, now + 0.05);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 3);
                
                // Layer 2: Softer Metallic Harmonic Over-tone
                const osc2 = AudioEngine.ctx.createOscillator();
                const gain2 = AudioEngine.ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(650, now); 
                gain2.gain.setValueAtTime(0, now);
                gain2.gain.linearRampToValueAtTime(0.1, now + 0.05);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 2);
                
                osc1.connect(gain1);
                gain1.connect(AudioEngine.ctx.destination);
                
                osc2.connect(gain2);
                gain2.connect(AudioEngine.ctx.destination);
                
                osc1.start(now);
                osc1.stop(now + 3);
                
                osc2.start(now);
                osc2.stop(now + 2);
            }
        };

        // --- PROTOCOLS DEFINITION ---
        const PROTOCOLS = {
            BOX: {
                name: 'Box Breathing',
                shortName: 'BOX',
                desc: 'Balance',
                sequence: [
                    { name: 'INHALE', multiplier: 1 },
                    { name: 'HOLD', multiplier: 1 },
                    { name: 'EXHALE', multiplier: 1 },
                    { name: 'HOLD', multiplier: 1 }
                ]
            },
            P142: {
                name: '1:4:2 Protocol',
                shortName: '1:4:2',
                desc: 'Tolerance',
                sequence: [
                    { name: 'INHALE', multiplier: 1 },
                    { name: 'HOLD', multiplier: 4 },
                    { name: 'EXHALE', multiplier: 2 }
                ]
            },
            CADENCE: {
                name: 'Cadence 1:2',
                shortName: 'CADENCE',
                desc: 'Down-Reg',
                sequence: [
                    { name: 'INHALE', multiplier: 1 },
                    { name: 'EXHALE', multiplier: 2 }
                ]
            }
        };

        // --- FOOTER COMPONENT ---
        const Footer = () => (
            <div className="w-full text-center pb-2 pt-2 mt-auto">
                <span className="text-[10px] font-bold tracking-[0.3em] text-gray-600 uppercase">
                    Adapt. Recover. Master.
                </span>
            </div>
        );

        // --- SETUP DASHBOARD ---
        const Setup = ({ onLaunch }) => {
            const [co2Score, setCo2Score] = useState(40);
            const [protocol, setProtocol] = useState('BOX');
            const [durationMins, setDurationMins] = useState(5); 

            // Calculate Base Unit (X) based on exact Shift Adapt tiers
            const calculateBase = (score) => {
                if (score > 80) return 8;
                if (score >= 60) return 7;
                if (score >= 40) return 6;
                if (score >= 20) return 5;
                return 3; 
            };
            const baseUnit = calculateBase(co2Score);

            const handleStart = () => {
                AudioEngine.init(); 
                
                const protocolData = PROTOCOLS[protocol];
                
                // MATH: Calculate exact cycles needed to hit the target minutes
                const cycleMultiplierSum = protocolData.sequence.reduce((acc, step) => acc + step.multiplier, 0);
                const cycleDurationSecs = cycleMultiplierSum * baseUnit;
                
                const targetTotalSecs = durationMins * 60;
                const targetCycles = Math.ceil(targetTotalSecs / cycleDurationSecs); // Always finish a full cycle
                const exactDurationSecs = targetCycles * cycleDurationSecs;

                onLaunch({
                    co2Score,
                    baseUnit,
                    protocolData,
                    targetCycles,
                    exactDurationSecs,
                    durationMins
                });
            };

            return (
                <div className="h-full flex flex-col p-4 max-w-lg mx-auto animate-fade-in">
                    <div className="text-center mt-2 mb-2">
                        <h1 className="text-4xl font-black italic tracking-tighter leading-none text-white">
                            NLC <span className="text-brand-orange">PERFORMANCE</span>
                        </h1>
                        <h2 className="text-xs font-bold tracking-[0.4em] text-gray-500 uppercase mt-1">Breathing Protocol</h2>
                        <div className="w-full h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent mt-4"></div>
                    </div>

                    <div className="flex-1 flex flex-col justify-evenly py-2">
                        
                        {/* 1. CO2 Input */}
                        <div className="w-full">
                            <label className="text-[11px] text-brand-orange uppercase mb-1 block font-bold tracking-widest">1. Daily CO2 Tolerance (Secs)</label>
                            <div className="flex items-center justify-between bg-[#111] p-1 border border-gray-800 rounded-md">
                                <button 
                                    onClick={() => setCo2Score(Math.max(10, co2Score - 5))}
                                    className="w-14 h-14 flex items-center justify-center text-3xl text-gray-400 bg-black rounded-sm active:bg-gray-900 transition-colors"
                                >-</button>
                                <div className="text-center flex-1">
                                    <div className="text-4xl font-mono font-bold text-white leading-none">{co2Score}</div>
                                    <div className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Base Breath: <span className="text-white">{baseUnit}s</span></div>
                                </div>
                                <button 
                                    onClick={() => setCo2Score(Math.min(120, co2Score + 5))}
                                    className="w-14 h-14 flex items-center justify-center text-3xl text-gray-400 bg-black rounded-sm active:bg-gray-900 transition-colors"
                                >+</button>
                            </div>
                        </div>

                        {/* 2. Protocol Selection */}
                        <div className="w-full">
                            <label className="text-[11px] text-brand-orange uppercase mb-1 block font-bold tracking-widest">2. Select Architecture</label>
                            <div className="grid grid-cols-3 gap-2">
                                {Object.entries(PROTOCOLS).map(([key, data]) => (
                                    <button 
                                        key={key}
                                        onClick={() => setProtocol(key)}
                                        className={`btn-tactical py-4 px-1 rounded-md flex flex-col items-center justify-center ${protocol === key ? 'selected' : ''}`}
                                    >
                                        <span className="font-bold text-sm md:text-base leading-tight mb-1">{data.shortName}</span>
                                        <span className="text-[9px] font-mono text-gray-500 leading-tight">{data.desc}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 3. Duration Selection */}
                        <div className="w-full">
                            <label className="text-[11px] text-brand-orange uppercase mb-1 block font-bold tracking-widest">3. Target Duration</label>
                            <div className="flex gap-2">
                                {[3, 5, 10].map(mins => (
                                    <button 
                                        key={mins}
                                        onClick={() => setDurationMins(mins)}
                                        className={`btn-tactical flex-1 py-4 rounded-md font-mono font-bold text-lg ${durationMins === mins ? 'selected' : ''}`}
                                    >
                                        {mins} <span className="text-[10px] text-gray-500">MIN</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="mt-2 mb-2">
                        <button 
                            onClick={handleStart}
                            className="w-full py-5 rounded-md bg-white text-black font-bold text-lg uppercase tracking-widest hover:bg-brand-orange hover:text-white transition-colors"
                        >
                            Initialize Protocol
                        </button>
                    </div>
                    <Footer />
                </div>
            );
        };

        // --- ACTIVE SESSION ---
        const ActiveSession = ({ config, onFinish, onCancel }) => {
            const { baseUnit, protocolData, targetCycles, exactDurationSecs } = config;
            
            const [currentCycle, setCurrentCycle] = useState(1);
            const [totalTimeLeft, setTotalTimeLeft] = useState(exactDurationSecs); 
            const [stepIndex, setStepIndex] = useState(0);
            const [stepTimeLeft, setStepTimeLeft] = useState(protocolData.sequence[0].multiplier * baseUnit);
            const [isActive, setIsActive] = useState(false);
            
            const [circleScale, setCircleScale] = useState(1);
            const [transitionSecs, setTransitionSecs] = useState(0);

            const intervalRef = useRef(null);
            const wakeLockRef = useRef(null);

            // Screen Wake Lock API to prevent phone sleeping
            const requestWakeLock = async () => {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                    }
                } catch (err) {
                    console.error('Wake Lock error:', err.message);
                }
            };

            const releaseWakeLock = async () => {
                if (wakeLockRef.current !== null) {
                    await wakeLockRef.current.release();
                    wakeLockRef.current = null;
                }
            };

            useEffect(() => {
                requestWakeLock();
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible') requestWakeLock();
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                setTimeout(() => {
                    setIsActive(true);
                    triggerPhaseCue(0);
                }, 500); 

                return () => {
                    clearInterval(intervalRef.current);
                    releaseWakeLock();
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, []);

            useEffect(() => {
                if (!isActive) return;

                intervalRef.current = setInterval(() => {
                    setTotalTimeLeft(prev => {
                        // Safety fallback
                        if (prev <= 1) return 0;
                        return prev - 1;
                    });

                    setStepTimeLeft(prevStepTime => {
                        if (prevStepTime <= 1) {
                            
                            let nextIdx = stepIndex + 1;
                            let nextCycle = currentCycle;

                            // If we finished all steps in the sequence, increment the cycle
                            if (nextIdx >= protocolData.sequence.length) {
                                nextIdx = 0;
                                nextCycle++;
                            }

                            // If we have completed the total target cycles, finish session
                            if (nextCycle > targetCycles) {
                                setIsActive(false);
                                setTimeout(() => onFinish(), 0);
                                return 0;
                            }

                            // Otherwise, move to next step
                            setStepIndex(nextIdx);
                            if (nextCycle !== currentCycle) setCurrentCycle(nextCycle);

                            const nextDuration = protocolData.sequence[nextIdx].multiplier * baseUnit;
                            triggerPhaseCue(nextIdx, nextDuration);
                            return nextDuration;
                        }
                        return prevStepTime - 1;
                    });
                }, 1000);

                return () => clearInterval(intervalRef.current);
            }, [isActive, stepIndex, currentCycle]);

            const triggerPhaseCue = (index, nextDuration) => {
                const step = protocolData.sequence[index];
                const duration = nextDuration || (step.multiplier * baseUnit);
                
                AudioEngine.playBell();

                if (step.name === 'INHALE') {
                    setTransitionSecs(duration);
                    setCircleScale(2.2); 
                } else if (step.name === 'EXHALE') {
                    setTransitionSecs(duration);
                    setCircleScale(1); 
                } else {
                    setTransitionSecs(0); 
                }
            };

            const currentStep = protocolData.sequence[stepIndex];
            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            return (
                <div className="h-full flex flex-col p-4 max-w-lg mx-auto relative">
                    <div className="scanline"></div>
                    
                    {/* Header */}
                    <div className="flex justify-between items-end border-b border-gray-800 pb-4 mt-2">
                        <div>
                            <div className="text-[10px] text-gray-500 uppercase tracking-widest">Protocol</div>
                            <div className="text-lg font-mono text-white leading-tight">{protocolData.name}</div>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] text-brand-orange uppercase tracking-widest font-bold">Cycle Progress</div>
                            <div className="text-lg font-mono text-white leading-tight">
                                {currentCycle} <span className="text-sm text-gray-600">/ {targetCycles}</span>
                            </div>
                        </div>
                    </div>

                    {/* HUD / Visualizer */}
                    <div className="flex-1 flex flex-col items-center justify-center relative">
                        
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div 
                                className="breath-circle"
                                style={{
                                    transform: `scale(${circleScale})`,
                                    transition: `transform ${transitionSecs}s linear`
                                }}
                            ></div>
                        </div>

                        <div className="z-10 text-center">
                            <div className="text-6xl md:text-7xl font-black italic uppercase text-white drop-shadow-[0_0_10px_rgba(0,0,0,1)] tracking-widest mb-1">
                                {currentStep.name}
                            </div>
                            <div className="text-5xl md:text-6xl font-mono font-bold text-brand-orange drop-shadow-[0_0_5px_rgba(0,0,0,0.8)]">
                                {stepTimeLeft}
                            </div>
                        </div>
                        
                        {/* Overall Session Countdown */}
                        <div className="absolute bottom-10 z-10 text-center w-full opacity-50">
                            <div className="text-[10px] text-white uppercase tracking-widest mb-1">Session Time Left</div>
                            <div className="text-xl font-mono text-brand-orange">{formatTime(totalTimeLeft)}</div>
                        </div>
                    </div>

                    {/* Footer Actions */}
                    <div className="mt-auto pt-2 flex flex-col items-center z-10">
                        <button 
                            onClick={onCancel} 
                            className="text-[10px] font-bold text-gray-600 uppercase tracking-widest hover:text-brand-orange border border-transparent hover:border-brand-orange px-4 py-2 rounded-md transition-all mb-2 bg-black/50"
                        >
                            [ CANCEL OPERATION ]
                        </button>
                        <Footer />
                    </div>
                </div>
            );
        };

        // --- SUMMARY ---
        const Summary = ({ config, onReset }) => {
            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const secs = s % 60;
                return m > 0 ? `${m}m ${secs}s` : `${secs}s`;
            };

            return (
                <div className="h-full flex flex-col p-4 max-w-lg mx-auto justify-center text-center animate-fade-in">
                    <h1 className="text-4xl font-black text-white italic mb-2">PROTOCOL COMPLETE</h1>
                    <div className="w-16 h-1 bg-brand-orange mx-auto mb-10"></div>
                    
                    <div className="bg-[#111] p-6 border border-gray-800 rounded-md flex flex-col justify-center mb-10">
                        <div className="text-[11px] text-gray-500 uppercase tracking-widest mb-4">Session Analytics</div>
                        <div className="text-4xl font-mono text-brand-orange mb-2">{formatTime(config.exactDurationSecs)}</div>
                        <div className="text-white text-sm font-bold uppercase tracking-widest mb-4">{config.protocolData.name}</div>
                        
                        <div className="text-xs text-gray-400 font-mono flex justify-between border-t border-gray-800 pt-4 mt-2">
                            <span>Base Unit: {config.baseUnit}s</span>
                            <span>Completed: {config.targetCycles} Cycles</span>
                        </div>
                    </div>
                    
                    <div className="mt-auto flex flex-col items-center">
                        <button 
                            onClick={onReset} 
                            className="w-full text-black bg-white rounded-md px-8 py-5 text-sm uppercase tracking-widest font-bold hover:bg-brand-orange hover:text-white transition-all mb-4"
                        >
                            Return to Dashboard
                        </button>
                        <Footer />
                    </div>
                </div>
            );
        };

        // --- APP ROOT ---
        const App = () => {
            const [view, setView] = useState('SETUP'); 
            const [config, setConfig] = useState(null);

            const handleLaunch = (launchConfig) => {
                setConfig(launchConfig);
                setView('WORKOUT');
            };

            const handleFinish = () => setView('SUMMARY');

            const handleReset = () => {
                setConfig(null);
                setView('SETUP');
            };

            return (
                <>
                    {view === 'SETUP' && <Setup onLaunch={handleLaunch} />}
                    {view === 'WORKOUT' && <ActiveSession config={config} onFinish={handleFinish} onCancel={handleReset} />}
                    {view === 'SUMMARY' && <Summary config={config} onReset={handleReset} />}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
